<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Etch a Sketch</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=REM:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./style.css">
        <script src="./script.js" defer></script>
    </head>

    <body>
        <header>
            <h1>Etch a Sketch</h1>
        </header>

        <main>
            <div class="controls">
                <div class="size-control">
                    <p>Screen Size: 8</p>
                    <input type="range" min="8" max="64" step="1" value="8">
                </div>

                <div class="color-control">
                    <p>Color Mode</p>
                    <button class="control-bt">Black</button>
                    <button class="control-bt">White</button>
                    <button class="control-bt">Rainbow</button>
                </div>

                <div class="erase-bt">
                    <button class="control-bt">Erase</button>
                </div>
            </div>

            <div class="screen"></div>
        </main>

        <footer>
            <p>Made by <a class="footer-link" href="https://github.com/Bre323">Bre323</a></p>
        </footer>
    </body>
</html>
